<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار قبلي</title>
    <!-- ربط ملف الـ CSS الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>


                                  
                           

<div class="quiz-container" style="margin-top: 50px;">
    <h2>اختبار قبلي (Pre-Test)</h2>
    <form id="preTestForm" action="../الجلسة الثانية.html" >
        
        <!-- السؤال الأول: اختيار من متعدد -->
        <div class="question-block">
            <div class="question-title">1. السمة الأساسية لوسم الرابط &lt;a&gt;:</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q1" value="HTML">
                        <span>src</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="SQL">
                        <span>href</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="Photoshop">
                        <span> link</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="Word">
                        <span>rel</span>
                    </label>
                </li>
            </ul>
        </div>
         <div class="question-block">
            <div class="question-title">2.الغرض من تصريح &lt;!DOCTYPE html&gt; :</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q2" value="HTML">
                        <span>  إخبار المتصفح بإصدار HTML المستخدم.  </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q2" value="SQL">
                        <span>  ربط ملف CSS الخارجي.  </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q2" value="Photoshop">
                        <span> إنشاء فقرة نصية.</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q2" value="Word">
                        <span> تحديد عنوان .</span>
                    </label>
                </li>
            </ul>
        </div>
        <div class="question-block">
            <div class="question-title">3. لكتابة اكبر عنوان في صفحة الويب نستخدم الوسم:</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q3" value="HTML">
                        <span> &lt;h1&gt;   </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q3" value="SQL">
                        <span> &lt;h2&gt; </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q3" value="Photoshop">
                        <span>&lt;head&gt; </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q3" value="Word">
                        <span> &lt;title&gt;</span>
                    </label>
                </li>
            </ul>
        </div>
        <div class="question-block">
            <div class="question-title">4.لإنشاء الفقرات نستخدم الوسم</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q4" value="HTML">
                        <span> &lt;p&gt;  </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q4" value="SQL">
                        <span> &lt;title&gt;  </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q4" value="Photoshop">
                        <span> &lt;s&gt;</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q4" value="Word">
                        <span>&lt;u&gt; </span>
                    </label>
                </li>
            </ul>
        </div>






        <!-- السؤال الثاني: صح و خطأ -->
        <div class="question-block">
            <div class="question-title">5.  وسم &lt;br&gt; يحتاج دائماً إلى وسم إغلاق &lt;br&gt;  </div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q5" value="True">
                        <span>صح</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q5" value="False">
                        <span>خطأ</span>
                    </label>
                </li>
            </ul>
        </div>
        <div class="question-block">
            <div class="question-title" >6.كتابة  الوسم    &lt;s&gt;داخل الوسم  &lt;p&gt; لوضع خط في منتصف النص كأنه مشطوب 
عليه .                                                                                          
  </div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q6" value="True">
                        <span>صح</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q6" value="False">
                        <span>خطأ</span>
                    </label>
                </li>
            </ul>
        </div>

        <button type="submit" class="submit-btn">إرسال الإجابات</button>
    </form>
</div>

</body>
</html>
