<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار قبلي</title>
    <!-- ربط ملف الـ CSS الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>


                                  
                           

<div class="quiz-container" style="margin-top: 50px;">
    <h2>اختبار بعدي (Final-Test)</h2>
    <form id="preTestForm">
        
        <!-- السؤال الأول: اختيار من متعدد -->
        <div class="question-block">
            <div class="question-title">1. أي مما يلي يُعد من لغات البرمجة وتصميم واجهات المستخدم؟</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q1" value="HTML">
                        <span>HTML</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="SQL">
                        <span>SQL</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="Photoshop">
                        <span>برنامج فوتوشوب</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="Word">
                        <span>برنامج مايكروسوفت وورد</span>
                    </label>
                </li>
            </ul>
        </div>

        <!-- السؤال الثاني: صح و خطأ -->
        <div class="question-block">
            <div class="question-title">2. تُستخدم لغة CSS لتنسيق وتصميم شكل صفحات الويب.</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q2" value="True">
                        <span>صح</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q2" value="False">
                        <span>خطأ</span>
                    </label>
                </li>
            </ul>
        </div>

        <button type="submit" class="submit-btn">إرسال الإجابات</button>
    </form>
</div>

</body>
</html>
