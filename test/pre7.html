<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار قبلي</title>
    <!-- ربط ملف الـ CSS الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>


                                  
                           

<div class="quiz-container" style="margin-top: 50px;">
    <h2>اختبار قبلي (Pre-Test)</h2>
    <form id="preTestForm" action="../الجلسة الثانية 2.html">
        
        <!-- السؤال الأول: اختيار من متعدد -->
        <div class="question-block">
            <div class="question-title">1. الخاصية التي تُستخدم لتغيير لون الخلفية:</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q1" value="HTML">
                        <span> color   </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="SQL">
                        <span>  bgcolor</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="Photoshop">
                        <span> background-color</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="Word">
                        <span>  background  </span>
                    </label>
                </li>
            </ul>
        </div>
         <div class="question-block">
            <div class="question-title">2. إضافة  لون خلفية لجميع عناصر &lt;h1&gt;:</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q2" value="HTML">
                        <span>h1 {background-color: #FFFFFF;}   </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q2" value="SQL">
                        <span>  all.h1 {background-color: #FFFFFF;} </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q2" value="Photoshop">
                        <span> h1.all {background-color: #FFFFFF;}  </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q2" value="Word">
                        <span>  .all {background-color: #FFFFFF;} </span>
                    </label>
                </li>
            </ul>
        </div>
         <div class="question-block">
            <div class="question-title">3.الخاصية التي تُستخدم لتغيير لون نص العنصر:</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q3" value="HTML">
                        <span>text-color    </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q3" value="SQL">
                        <span> color   </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q3" value="Photoshop">
                        <span>  font-color  </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q3" value="Word">
                        <span> background-color </span>
                    </label>
                </li>
            </ul>
        </div>
        

        <!-- السؤال الثاني: صح و خطأ -->
        <div class="question-block">
            <div class="question-title">4. خاصية color تُستخدم لتغيير لون خلفية العنصر. </div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q4" value="True">
                        <span>صح</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q4" value="False">
                        <span>خطأ</span>
                    </label>
                </li>
            </ul>
        </div>

        <button type="submit" class="submit-btn">إرسال الإجابات</button>
    </form>
</div>

</body>
</html>
