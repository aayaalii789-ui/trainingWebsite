<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار قبلي</title>
    <!-- ربط ملف الـ CSS الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>


                                  
                           

<div class="quiz-container" style="margin-top: 50px;">
    <h2>اختبار قبلي (Pre-Test)</h2>
    <form id="preTestForm" action="../الجلسة الرابعة 4.html">
        
        <!-- السؤال الأول: اختيار من متعدد -->
        <div class="question-block">
            <div class="question-title">1.لجعل الحرف الأول من كل كلمة كبيراً، نستخدم:</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q1" value="HTML">
                        <span> text-transform: capitalize   </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="SQL">
                        <span> text-style: uppercase  </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="Photoshop">
                        <span> font-variant: small-caps </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q1" value="Word">
                        <span>   text-align: center   </span>
                    </label>
                </li>
            </ul>
        </div>
         <div class="question-block">
            <div class="question-title">2.لإضافة فراغ قبل أول سطر ، نستخدم:</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q2" value="HTML">
                        <span>align: center </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q2" value="SQL">
                        <span> text-align: center  </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q2" value="Photoshop">
                        <span> margin: center   </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q2" value="Word">
                        <span>   text-indent</span>
                    </label>
                </li>
            </ul>
        </div>
         <div class="question-block">
            <div class="question-title">3.لإضافة مافات بين الحروف ، نستخدم:</div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q3" value="HTML">
                        <span>align: center    </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q3" value="SQL">
                        <span> text-align: center    </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q3" value="Photoshop">
                        <span> margin: center  </span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q3" value="Word">
                        <span> letter-spacing </span>
                    </label>
                </li>
            </ul>
        </div>
        

        <!-- السؤال الثاني: صح و خطأ -->
        <div class="question-block">
            <div class="question-title">4.  font-weight تُستخدم لإضافة زخرفة النص  . </div>
            <ul class="options-list">
                <li>
                    <label>
                        <input type="radio" name="q4" value="True">
                        <span>صح</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="q4" value="False">
                        <span>خطأ</span>
                    </label>
                </li>
            </ul>
        </div>

        <button type="submit" class="submit-btn">إرسال الإجابات</button>
    </form>
</div>

</body>
</html>
